<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Gym Tracker V10 Elite Pro v2.0.3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg0:#060d1b;--bg1:#0b1628;--bg2:#111d33;--bg3:#162440;--inp:#0d1829;--bdr:#1e3050;--ac:#00e676;--acg:rgba(0,230,118,0.25);--ac2:#00bcd4;--ac3:#7c4dff;--red:#ff5252;--orn:#ffab40;--tx:#e8edf5;--tx2:#7a8ba8;--tx3:#4a5d7a;--rad:14px;--shd:0 4px 24px rgba(0,0,0,0.4);--tr:0.25s cubic-bezier(.4,0,.2,1)}
body.light-theme{--bg0:#f0f3f8;--bg1:#ffffff;--bg2:#f8fafc;--bg3:#e2e8f0;--inp:#ffffff;--bdr:#cbd5e1;--tx:#0f172a;--tx2:#475569;--tx3:#94a3b8}
body.light-theme input[type="date"]{color-scheme:light;background:var(--inp)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg0);color:var(--tx);min-height:100vh;overflow-x:hidden;padding-bottom:100px}
body::before{content:'';position:fixed;top:-40%;left:-20%;width:140%;height:140%;background:radial-gradient(ellipse at 30% 20%,rgba(0,230,118,0.04) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(0,188,212,0.03) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(124,77,255,0.02) 0%,transparent 60%);pointer-events:none;z-index:0}
header{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,var(--bg1) 0%,rgba(11,22,40,0.95) 100%);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:14px 16px 10px;border-bottom:1px solid var(--bdr)}
.header-top{display:flex;align-items:center;justify-content:space-between}
header h1{font-size:1.25rem;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:flex;align-items:center;gap:8px}
header h1 .icon{font-size:1.4rem;-webkit-text-fill-color:initial}
.header-controls{display:flex;align-items:center;gap:8px}
.save-btn{background:rgba(0,230,118,0.12);border:1px solid rgba(0,230,118,0.3);border-radius:10px;color:var(--ac);padding:5px 10px;font-size:0.85rem;cursor:pointer;transition:var(--tr);display:flex;align-items:center;gap:4px}
.save-btn:hover{background:rgba(0,230,118,0.2);border-color:var(--ac)}
.save-btn:active{transform:scale(0.92)}
.streak-row{display:flex;align-items:center;gap:12px;margin-top:8px;flex-wrap:wrap}
.streak-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(255,171,64,0.15),rgba(255,82,82,0.1));border:1px solid rgba(255,171,64,0.3);border-radius:20px;padding:3px 10px 3px 7px;font-size:0.75rem;font-weight:700;color:var(--orn)}
.streak-badge .fire{font-size:1rem}
.progress-wrap{margin-top:8px;display:none}
.progress-wrap.visible{display:block}
.progress-label{display:flex;justify-content:space-between;font-size:0.7rem;color:var(--tx2);margin-bottom:4px}
.progress{height:10px;background:var(--bg2);border-radius:10px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,0.4)}
.bar{height:100%;width:0;border-radius:10px;background:linear-gradient(90deg,var(--ac),var(--ac2));box-shadow:0 0 12px var(--acg);transition:width 0.6s cubic-bezier(.4,0,.2,1)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:linear-gradient(0deg,var(--bg1) 80%,rgba(11,22,40,0) 100%);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:8px 16px 16px;display:flex;justify-content:space-around;align-items:center;border-top:1px solid var(--bdr)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--tx2);cursor:pointer;padding:6px 12px;border-radius:12px;min-width:0;flex:1;transition:var(--tr);position:relative;font-family:inherit}
.nav-btn .nav-icon{font-size:1.3rem;transition:var(--tr)}
.nav-btn .nav-label{font-size:0.65rem;font-weight:600;letter-spacing:0.3px}
.nav-btn.active{color:var(--ac)}
.nav-btn.active .nav-icon{transform:scale(1.15)}
.nav-btn.active::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:24px;height:3px;border-radius:3px;background:var(--ac);box-shadow:0 0 8px var(--acg)}
.nav-btn:active{transform:scale(0.9)}
.page{display:none;padding:12px 14px 20px;position:relative;z-index:1;animation:fadeUp 0.3s ease}
.page.show{display:block}
@media(min-width:768px){body{max-width:520px;margin:0 auto;box-shadow:0 0 80px rgba(0,0,0,0.5)}.bottom-nav{max-width:520px;left:50%;transform:translateX(-50%)}.timer-btn{right:calc(50% - 244px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rad);padding:14px;margin:10px 0;position:relative;overflow:hidden;transition:var(--tr)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,230,118,0.1),transparent)}
.card.completed{border-color:rgba(0,230,118,0.25)}
.exercise-header{display:flex;align-items:flex-start;gap:10px}
.exercise-header .name{flex:1;font-weight:700;font-size:0.95rem;line-height:1.3}
.check-wrap{position:relative;width:26px;height:26px;flex-shrink:0;margin-top:1px}
.check-wrap input{position:absolute;opacity:0;width:100%;height:100%;cursor:pointer;z-index:2;margin:0}
.check-box{width:26px;height:26px;border-radius:8px;border:2px solid var(--tx3);display:flex;align-items:center;justify-content:center;transition:var(--tr);font-size:0.8rem}
.check-wrap input:checked+.check-box{background:var(--ac);border-color:var(--ac);box-shadow:0 0 12px var(--acg)}
.check-wrap input:checked+.check-box::after{content:'\2713';color:var(--bg0);font-weight:900}

.sets-row{display:flex;gap:6px;margin-top:10px;flex-wrap:nowrap;justify-content:space-between;width:100%}
.set-chip{display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--inp);border:1px solid var(--bdr);border-radius:10px;padding:6px 4px;flex:1;min-width:0;font-size:0.7rem;color:var(--tx2)}
.set-chip .set-num{font-weight:700;color:var(--tx);font-size:0.75rem}
.set-chip.done-set{border-color:rgba(0,230,118,0.3);background:rgba(0,230,118,0.08)}
.set-chip.done-set .set-num{color:var(--ac)}

.input-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
.input-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:70px}
.input-group label{font-size:0.65rem;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
input[type="number"],input[type="text"],textarea,select{background:var(--inp);border:1px solid var(--bdr);border-radius:10px;color:var(--tx);padding:8px 10px;font-size:0.85rem;font-family:inherit;transition:var(--tr);width:100%}
select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%237a8ba8' d='M0 0l5 5 5-5z'/></svg>");background-repeat:no-repeat;background-position:right 10px center;padding-right:26px}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 3px var(--acg)}
.timer-btn{position:fixed;bottom:96px;right:16px;z-index:150;width:52px;height:52px;border-radius:50%;border:2px solid var(--ac2);background:rgba(0,188,212,0.12);color:var(--ac2);font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(0,188,212,0.2);transition:var(--tr)}
.timer-btn.running{border-color:var(--orn);color:var(--orn);background:rgba(255,171,64,0.12)}
.timer-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(6,13,27,0.85);backdrop-filter:blur(12px);align-items:center;justify-content:center}
.timer-overlay.open{display:flex}
.timer-panel{background:var(--bg2);border:1px solid var(--bdr);border-radius:24px;padding:30px 24px;text-align:center;width:min(320px,90vw);position:relative;animation:fadeUp 0.3s ease}
.timer-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--tx2);font-size:1.2rem;cursor:pointer;transition:var(--tr)}
.timer-close:hover{color:var(--red)}
.timer-display{font-size:3.5rem;font-weight:900;letter-spacing:-2px;margin:16px 0;color:var(--tx)}
.timer-display.running{color:var(--ac2)}
.timer-presets{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap}
.timer-preset{padding:6px 14px;border-radius:20px;border:1px solid var(--bdr);background:var(--inp);color:var(--tx2);cursor:pointer;font-size:0.8rem;font-weight:600;transition:var(--tr)}
.timer-preset.active{border-color:var(--ac2);color:var(--ac2);background:rgba(0,188,212,0.1)}
.timer-controls{display:flex;gap:10px;justify-content:center;margin-top:16px}
.timer-ctrl{padding:10px 24px;border-radius:14px;border:none;font-size:0.9rem;font-weight:700;cursor:pointer;transition:var(--tr)}
.timer-ctrl.start{background:var(--ac);color:var(--bg0)}
.timer-ctrl.stop{background:var(--red);color:white}
.timer-ctrl.reset{background:var(--inp);color:var(--tx2);border:1px solid var(--bdr)}
.dash-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;align-items:stretch}
.dash-full{grid-column:span 2}
.dash-grid .card{margin:0;display:flex;flex-direction:column;justify-content:between;min-height:140px}
.stat-box{text-align:center;padding:4px 0;flex-grow:1;display:flex;flex-direction:column;justify-content:center}
.stat-val{font-size:1.8rem;font-weight:900}
.stat-val.green{color:var(--ac)}.stat-val.cyan{color:var(--ac2)}.stat-val.purple{color:var(--ac3)}.stat-val.orange{color:var(--orn)}
.stat-label{font-size:0.65rem;color:var(--tx2);text-transform:uppercase;letter-spacing:0.5px;margin-top:4px}
.water-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;justify-content:center}
.water-glass{width:32px;height:40px;border-radius:6px;border:2px solid var(--bdr);background:var(--inp);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.85rem;transition:var(--tr);color:var(--tx2)}
.water-glass.filled{border-color:rgba(0,188,212,0.4);background:rgba(0,188,212,0.12);color:var(--ac2)}
.quote-card{background:linear-gradient(135deg,rgba(124,77,255,0.08),rgba(0,230,118,0.05));border-color:rgba(124,77,255,0.2);text-align:center;padding:16px;min-height:auto!important}
.quote-text{font-style:italic;font-size:0.85rem;line-height:1.5}
.quote-author{font-size:0.7rem;color:var(--tx2);margin-top:6px}
.day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;border-bottom:1px solid var(--bdr);padding-bottom:10px}
.day-title{font-size:1.15rem;font-weight:900;letter-spacing:-0.3px}
.day-header-right{display:flex;align-items:center;gap:8px}
.action-icon-btn{background:var(--inp);border:1px solid var(--bdr);color:var(--tx2);width:28px;height:28px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.85rem;transition:var(--tr)}
.action-icon-btn:hover{border-color:var(--ac);color:var(--ac)}
.complete-all-btn{background:var(--ac);color:var(--bg0);border:none;border-radius:8px;padding:4px 10px;font-size:0.75rem;font-weight:700;cursor:pointer;transition:var(--tr)}
.analytics-box{background:linear-gradient(180deg,rgba(0,230,118,0.03),transparent);border:1px dashed var(--bdr);border-radius:var(--rad);padding:12px;margin-bottom:12px}
.analytics-title{font-size:0.7rem;font-weight:700;color:var(--ac);text-transform:uppercase;margin-bottom:6px;letter-spacing:0.5px}
.calendar-wrapper{margin-top:10px;background:var(--inp);border-radius:10px;padding:10px;border:1px solid var(--bdr)}
.calendar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.calendar-month-title{font-size:0.85rem;font-weight:700;color:var(--tx)}
.calendar-nav-btn{background:none;border:none;color:var(--ac2);cursor:pointer;font-weight:900;font-size:1rem;padding:4px 8px}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
.calendar-day-lbl{font-size:0.6rem;color:var(--tx3);font-weight:700;text-transform:uppercase}
.calendar-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:0.75rem;border-radius:6px;cursor:pointer;position:relative;color:var(--tx2);transition:var(--tr)}
.calendar-cell:hover{background:var(--bg3);color:var(--tx)}
.calendar-cell.active-day{background:var(--bdr);color:var(--ac2);font-weight:700}
.dot-indicator{width:4px;height:4px;background-color:var(--ac);border-radius:50%;position:absolute;bottom:3px}
.selected-day-log{margin-top:10px;padding:12px;background:var(--bg2);border-radius:12px;font-size:0.8rem;color:var(--tx);border:1px solid var(--bdr)}
.history-pr-card{background:var(--inp);border:1px solid var(--bdr);border-radius:10px;padding:8px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.history-pr-name{font-weight:700;color:var(--tx)}
.history-pr-val{font-weight:900;color:var(--ac2);background:rgba(0,188,212,0.1);padding:2px 8px;border-radius:6px;font-size:0.75rem}
.remove-modal-overlay{display:none;position:fixed;inset:0;z-index:400;background:rgba(6,13,27,0.85);backdrop-filter:blur(12px);align-items:center;justify-content:center}
.remove-modal-overlay.open{display:flex}
.remove-modal{background:var(--bg2);border:1px solid var(--bdr);border-radius:20px;padding:20px;width:min(340px,90vw);animation:fadeUp 0.3s ease}
.remove-modal h3{font-size:0.95rem;margin-bottom:12px;color:var(--ac)}
.remove-modal .exercise-check{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:0.85rem;color:var(--tx)}
.remove-modal .exercise-check input{accent-color:var(--ac);width:18px;height:18px}
.remove-modal-btns{display:flex;gap:10px;margin-top:14px;justify-content:flex-end}
.remove-modal-btns button{padding:8px 18px;border-radius:10px;font-size:0.8rem;font-weight:700;cursor:pointer;border:none;transition:var(--tr)}
.remove-modal-btns .cancel-btn{background:var(--inp);color:var(--tx2);border:1px solid var(--bdr)}
.remove-modal-btns .confirm-btn{background:var(--red);color:white}
.export-section{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.export-btn{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:12px;border:1px solid var(--bdr);background:var(--inp);color:var(--tx2);cursor:pointer;font-size:0.75rem;font-weight:600;transition:var(--tr);font-family:inherit}
.export-btn:hover{border-color:var(--ac2);color:var(--ac2)}
.export-btn.gdrive{border-color:rgba(0,230,118,0.4);color:var(--ac);background:rgba(0,230,118,0.08)}
.export-btn.gdrive:hover{border-color:var(--ac);background:rgba(0,230,118,0.15)}
.import-input{display:none}
.save-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);z-index:500;background:var(--bg2);border:1px solid rgba(0,230,118,0.3);border-radius:14px;padding:8px 18px;display:flex;align-items:center;gap:8px;font-size:0.8rem;font-weight:700;color:var(--ac);box-shadow:0 4px 24px rgba(0,230,118,0.15);transition:transform 0.35s cubic-bezier(.4,0,.2,1);pointer-events:none}
.save-toast.show{transform:translateX(-50%) translateY(0)}
.save-toast .toast-icon{font-size:1rem}

.switch-wrap{display:flex;align-items:center;justify-content:space-between;background:var(--inp);border:1px dashed var(--bdr);padding:10px 14px;border-radius:10px;margin-top:8px}
.switch-slider{position:absolute;cursor:pointer;inset:0;background-color:var(--bg3);border:1px solid var(--bdr);border-radius:24px;transition:var(--tr)}
.switch-slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background-color:var(--tx2);border-radius:50%;transition:var(--tr)}
.switch-box{position:relative;display:inline-block;width:46px;height:24px}
.switch-box input{opacity:0;width:0;height:0}
.switch-box input:checked + .switch-slider{background-color:rgba(0,230,118,0.15);border-color:var(--ac)}
.switch-box input:checked + .switch-slider:before{transform:translateX(22px);background-color:var(--ac)}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:4px}
#confetti{position:fixed;inset:0;z-index:999;pointer-events:none}
.pr-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.pr-item{display:flex;flex-direction:column;gap:2px}
.pr-item label{font-size:0.55rem;color:var(--tx2);font-weight:600;text-transform:uppercase}
.pr-item input{padding:6px 8px;font-size:0.8rem}
.weight-log-row{display:flex;gap:6px;align-items:center;margin-top:6px}
.weight-log-row input{flex:1;min-width:0}
.global-date-container{background:var(--inp);border:1px solid var(--bdr);border-radius:10px;padding:8px 12px;margin-top:10px;display:flex;align-items:center;gap:10px}
.global-date-container label{font-size:0.75rem;font-weight:700;color:var(--ac2);text-transform:uppercase;letter-spacing:0.5px}
.global-date-container input[type="date"]{flex:1;padding:6px 10px;font-size:0.85rem;color-scheme:dark;border-radius:6px;border:1px solid var(--bdr);background:var(--bg0)}

.version-card {background: var(--bg3); border: 1px solid var(--bdr); border-radius: var(--rad); padding: 12px; text-align: center; font-size: 0.75rem; color: var(--tx2); font-weight: 600; letter-spacing: 0.5px; margin-top: 12px; display: flex; align-items: center; justify-content: space-between;}
.version-tag {background: rgba(0, 188, 212, 0.12); border: 1px solid rgba(0, 188, 212, 0.3); padding: 2px 8px; border-radius: 6px; color: var(--ac2); font-family: monospace; font-size: 0.8rem;}
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div class="save-toast" id="saveToast"><span class="toast-icon">✓</span> Saved!</div>
<header>
  <div class="header-top">
    <h1><span class="icon">🏆</span>Gym Tracker ⚡⚡</h1>
    <div class="header-controls">
      <button class="save-btn" onclick="toggleTheme()" style="background:rgba(0,188,212,0.12);border-color:rgba(0,188,212,0.3);color:var(--ac2);">🌓 Theme</button>
      <button class="save-btn" onclick="manualSave()" title="Save now">💾 Save</button>
    </div>
  </div>
  <div class="global-date-container">
    <label>Log Date:</label>
    <input type="date" id="globalWorkoutDate" onchange="handleGlobalDateChange()">
  </div>
  <div class="streak-row">
    <div class="streak-badge"><span class="fire">🔥</span><span id="streakCount">0</span> day streak</div>
    <div class="streak-badge" id="todayBadge" style="display:none;border-color:rgba(0,230,118,0.3);background:linear-gradient(135deg,rgba(0,230,118,0.12),rgba(0,188,212,0.08));color:var(--ac);">✅ Today logged</div>
  </div>
  <div class="progress-wrap" id="headerProgressBar">
    <div class="progress-label"><span id="pctLabel">0%</span><span id="doneCount">0/0 exercises</span></div>
    <div class="progress"><div class="bar" id="bar"></div></div>
  </div>
</header>
<div id="pages"></div>
<div class="bottom-nav" id="bottomNav"></div>
<button class="timer-btn" id="timerToggle" onclick="toggleTimer()">⏱</button>
<div class="timer-overlay" id="timerOverlay">
  <div class="timer-panel">
    <button class="timer-close" onclick="toggleTimer()">✕</button>
    <div style="font-size:1.4rem;">⏱️ Rest Timer</div>
    <div class="timer-display" id="timerDisplay">1:00</div>
    <div class="timer-presets">
      <button class="timer-preset active" onclick="setTimerPreset(60,this)">1 min</button>
      <button class="timer-preset" onclick="setTimerPreset(90,this)">1:30</button>
      <button class="timer-preset" onclick="setTimerPreset(120,this)">2 min</button>
      <button class="timer-preset" onclick="setTimerPreset(180,this)">3 min</button>
      <button class="timer-preset" onclick="setTimerPreset(300,this)">5 min</button>
    </div>
    <div class="timer-controls">
      <button class="timer-ctrl start" id="timerStartBtn" onclick="startTimer()">Start</button>
      <button class="timer-ctrl reset" onclick="resetTimer()">Reset</button>
    </div>
  </div>
</div>
<div class="remove-modal-overlay" id="removeModal">
  <div class="remove-modal">
    <h3>🗑️ Remove Exercises</h3>
    <p style="font-size:0.75rem;color:var(--tx2);margin-bottom:8px;">Select exercises to remove from today and future sessions:</p>
    <div id="removeCheckboxes"></div>
    <div class="remove-modal-btns">
      <button class="cancel-btn" onclick="closeRemoveModal()">Cancel</button>
      <button class="confirm-btn" onclick="confirmRemove()">Remove Selected</button>
    </div>
  </div>
</div>
<script>
const SAVE_KEY = "gymtracker_save";
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby-UZMVXGfvWI1hgxcfXi4loHvPM2CEeaccPJtWZQXFaC3vVtFyXly2xwUyJLqL7oV_/exec";

const DEFAULT_PLAN = {
  "Monday":["Incline DB Press","Bench Press","Machine Chest Press","Pec Deck","Cable Fly","Plank","Hanging Knee Raise"],
  "Tuesday":["Lat Pulldown","Cable Row","Chest Supported Row","Straight Arm Pulldown","EZ Curl","Hammer Curl","Preacher Curl"],
  "Wednesday":["DB Press","Lateral Raise","Cable Lateral Raise","Rear Delt Fly","Face Pull","Cable Crunch","Russian Twist"],
  "Thursday":["Incline Chest Press","Pec Deck","Cable Fly","Rope Pushdown","Bar Pushdown","Overhead Extension","Assisted Dip"],
  "Friday":["Bench Press","Lat Pulldown","Shoulder Press","Chest Supported Row","Close Grip Bench","EZ Curl","Face Pull"],
  "Saturday":["Leg Press","Hack Squat","Leg Extension","Seated Leg Curl","Lying Leg Curl","Hip Thrust","Standing Calf Raise"]
};
const QUOTES = [
  {t:"Success isn't always about greatness. It's about consistency.",a:"Dwayne Johnson"},
  {t:"The pain you feel today will be the strength you feel tomorrow.",a:"Arnold Schwarzenegger"},
  {t:"The iron never lies to you. Two hundred pounds is always two hundred pounds.",a:"Henry Rollins"},
  {t:"Don't count the days, make the days count.",a:"Muhammad Ali"}
];
const PR_FIELDS = ["Bench","Squat","Deadlift","OHP","Incline BP","Lat PD","Barbell Row","Leg Press","Hack Squat","EZ Curl","Calf Raise","Face Pull"];

let S = {
  plan: JSON.parse(JSON.stringify(DEFAULT_PLAN)),
  fields: {},
  water: 0,
  protein: "",
  steps: "",
  gdriveSyncEnabled: false,
  gdriveSyncKey: "",
  streak: {count:0, lastDate:null},
  workoutLog: {},
  calMonth: new Date().getMonth(),
  calYear: new Date().getFullYear(),
  currentRoutine: null,
  weightHistory: [],
  waistHistory: [],
  proteinHistory: [],
  stepsHistory: [],
  workoutDate: "",
  lightTheme: false
};

const dayKeys = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
let currentTab = "Dashboard";
let syncTimeout = null;

let toastTimeout = null;
function showSaveToast(message = "Saved!"){
  let t = document.getElementById("saveToast");
  if(!t) return;
  t.innerHTML = `<span class="toast-icon">✓</span> ${message}`;
  t.classList.add("show");
  if(toastTimeout) clearTimeout(toastTimeout);
  toastTimeout = setTimeout(()=>{ t.classList.remove("show"); }, 1500);
}

function manualSave(){
  saveState();
  showSaveToast();
}

function saveState(){
  document.querySelectorAll("[data-id]").forEach(el=>{
    S.fields[el.dataset.id] = el.type==="checkbox" ? el.checked : el.value;
  });
  let activeDate = S.workoutDate;
  
  let wVal = S.fields["weight"];
  if(wVal !== undefined){
    let existing = S.weightHistory.find(e=>e.date===activeDate);
    if(existing) existing.value = wVal !== "" ? parseFloat(wVal) : "";
    else if(wVal !== "") S.weightHistory.push({date:activeDate, value:parseFloat(wVal)});
  }
  
  let waVal = S.fields["waist"];
  if(waVal !== undefined){
    let existing = S.waistHistory.find(e=>e.date===activeDate);
    if(existing) existing.value = waVal !== "" ? parseFloat(waVal) : "";
    else if(waVal !== "") S.waistHistory.push({date:activeDate, value:parseFloat(waVal)});
  }

  let protVal = S.fields["protein"];
  if(protVal !== undefined){
    let existing = S.proteinHistory.find(e=>e.date===activeDate);
    if(existing) existing.value = protVal !== "" ? parseInt(protVal) : "";
    else if(protVal !== "") S.proteinHistory.push({date:activeDate, value:parseInt(protVal)});
  }

  let stepsVal = S.fields["steps"];
  if(stepsVal !== undefined){
    let existing = S.stepsHistory.find(e=>e.date===activeDate);
    if(existing) existing.value = stepsVal !== "" ? parseInt(stepsVal) : "";
    else if(stepsVal !== "") S.stepsHistory.push({date:activeDate, value:parseInt(stepsVal)});
  }
  
  let currentDayExercises = S.plan[S.currentRoutine] || [];
  let dayLog = [];
  currentDayExercises.forEach(ex=>{
    let done = document.getElementById(`chk_${ex}`)?.checked || false;
    let sets = [];
    for(let s=1; s<=3; s++){
      let w = document.getElementById(`w_${ex}_${s}`)?.value || "";
      let r = document.getElementById(`r_${ex}_${s}`)?.value || "";
      sets.push({w, r});
    }
    dayLog.push({exercise:ex, done, sets});
  });
  S.workoutLog[activeDate] = dayLog;

  localStorage.setItem(SAVE_KEY, JSON.stringify(S));
  updateStreakBadge();
  triggerCloudAutoSync();
}

function loadState(){
  let saved = localStorage.getItem(SAVE_KEY);
  if(saved){
    try {
      let parsed = JSON.parse(saved);
      if(parsed && typeof parsed === "object"){
        S = Object.assign(S, parsed);
      }
    } catch(e) { console.error(e); }
  }
  
  const nowStr = new Date().toISOString().split("T")[0];
  S.workoutDate = nowStr;
  
  let d = new Date(S.workoutDate);
  let dayIdx = (d.getDay()+6)%7;
  S.currentRoutine = dayKeys[dayIdx] || "Monday";
  
  if(S.lightTheme) document.body.classList.add("light-theme");
  else document.body.classList.remove("light-theme");

  document.getElementById("globalWorkoutDate").value = S.workoutDate;
  loadActiveDayLog();
}

function toggleTheme(){
  document.body.classList.toggle("light-theme");
  S.lightTheme = document.body.classList.contains("light-theme");
  saveState();
  showSaveToast();
}

function handleGlobalDateChange(){
  let inputVal = document.getElementById("globalWorkoutDate").value;
  if(inputVal) {
    S.workoutDate = inputVal;
    let d = new Date(inputVal);
    let dayIdx = (d.getDay()+6)%7;
    S.currentRoutine = dayKeys[dayIdx] || "Monday";
    
    loadActiveDayLog();
    renderAllPages();
    if(currentTab === "History") renderCalendar();
    showSaveToast();
  }
}

function loadActiveDayLog(){
  let activeDate = S.workoutDate;
  let loggedDay = S.workoutLog[activeDate];
  
  PR_FIELDS.forEach(f=>{
    if(S.fields[`pr_${f}`] === undefined) S.fields[`pr_${f}`] = "";
  });
  if(S.fields["weight"] === undefined) S.fields["weight"] = "";
  if(S.fields["waist"] === undefined) S.fields["waist"] = "";
  if(S.fields["protein"] === undefined) S.fields["protein"] = "";
  if(S.fields["steps"] === undefined) S.fields["steps"] = "";

  if(loggedDay && Array.isArray(loggedDay)){
    let customPlan = [];
    loggedDay.forEach(item=>{
      customPlan.push(item.exercise);
      S.fields[`chk_${item.exercise}`] = item.done;
      if(item.sets && Array.isArray(item.sets)){
        item.sets.forEach((st, idx)=>{
          if(idx < 3) {
            S.fields[`w_${item.exercise}_${idx+1}`] = st.w || "";
            S.fields[`r_${item.exercise}_${idx+1}`] = st.r || "";
          }
        });
      }
    });
    S.plan[S.currentRoutine] = customPlan;
  } else {
    let currentDayExercises = S.plan[S.currentRoutine] || [];
    currentDayExercises.forEach(ex=>{
      S.fields[`chk_${ex}`] = false;
      for(let s=1; s<=3; s++){
        S.fields[`w_${ex}_${s}`] = "";
        S.fields[`r_${ex}_${s}`] = "";
      }
    });
  }
  
  let wRecord = S.weightHistory.find(e=>e.date===activeDate);
  S.fields["weight"] = (wRecord && wRecord.value !== "") ? wRecord.value : "";
  let waRecord = S.waistHistory.find(e=>e.date===activeDate);
  S.fields["waist"] = (waRecord && waRecord.value !== "") ? waRecord.value : "";
  let protRecord = S.proteinHistory.find(e=>e.date===activeDate);
  S.fields["protein"] = (protRecord && protRecord.value !== "") ? protRecord.value : "";
  let stepsRecord = S.stepsHistory.find(e=>e.date===activeDate);
  S.fields["steps"] = (stepsRecord && stepsRecord.value !== "") ? stepsRecord.value : "";
}

function generateRandomSyncKey() {
  const key = "gym-" + Math.random().toString(36).substring(2, 7) + "-" + Math.random().toString(36).substring(2, 7);
  document.getElementById("syncKeyInput").value = key;
  S.gdriveSyncKey = key;
  saveState();
}

function handleSyncToggle(checked){
  S.gdriveSyncEnabled = checked;
  saveState();
  if(checked && S.gdriveSyncKey) {
    fetchDataFromCloudDrive();
  } else {
    let statusText = document.getElementById("gdriveStatusText");
    if(statusText) statusText.innerText = "Status: Local Only";
  }
}

async function fetchDataFromCloudDrive() {
  if(!S.gdriveSyncEnabled || !S.gdriveSyncKey) return;
  let statusText = document.getElementById("gdriveStatusText");
  if(statusText) statusText.innerText = "Syncing profile down...";
  
  try {
    const response = await fetch(`${APPS_SCRIPT_URL}?key=${S.gdriveSyncKey}`);
    if(response.ok) {
      const remoteData = await response.json();
      if(remoteData && remoteData.plan) {
        S = Object.assign(S, remoteData);
        S.gdriveSyncEnabled = true;
        localStorage.setItem(SAVE_KEY, JSON.stringify(S));
        
        loadState();
        renderAllPages();
        if(currentTab === "History") renderCalendar();
        showSaveToast("Cloud profile loaded!");
      } else {
        if(statusText) statusText.innerText = "Connected (New Cloud Slot)";
      }
    }
  } catch (err) {
    if(statusText) statusText.innerText = "Sync error connection timed out.";
  }
}

function triggerCloudAutoSync() {
  if(!S.gdriveSyncEnabled || !S.gdriveSyncKey) return;
  
  clearTimeout(syncTimeout);
  let statusText = document.getElementById("gdriveStatusText");
  if(statusText) statusText.innerText = "Cloud update pending...";
  
  syncTimeout = setTimeout(async () => {
    try {
      await fetch(`${APPS_SCRIPT_URL}?key=${S.gdriveSyncKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(S)
      });
      const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      if(statusText) statusText.innerText = `Connected (Synced at ${now})`;
    } catch(err) {
      if(statusText) statusText.innerText = "Auto-sync update failed.";
    }
  }, 3000);
}

function triggerManualCloudSync() {
  if(!S.gdriveSyncKey) {
    alert("Please enter or generate a Sync Key first!");
    return;
  }
  showSaveToast("Syncing account...");
  saveState();
  fetchDataFromCloudDrive();
}

function exportLocalJSON(){
  let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(S));
  let downloadAnchor = document.createElement('a');
  downloadAnchor.setAttribute("href", dataStr);
  downloadAnchor.setAttribute("download", `gym_tracker_backup_${S.workoutDate}.json`);
  document.body.appendChild(downloadAnchor);
  downloadAnchor.click();
  document.body.removeChild(downloadAnchor);
  showSaveToast();
}

function updateProgress(){
  let currentDayExercises = S.plan[S.currentRoutine] || [];
  let total = currentDayExercises.length;
  let done = 0;
  currentDayExercises.forEach(ex=>{
    if(document.getElementById(`chk_${ex}`)?.checked) done++;
  });
  let pct = total > 0 ? Math.round((done/total)*100) : 0;
  let lbl = document.getElementById("pctLabel");
  let cnt = document.getElementById("doneCount");
  let bar = document.getElementById("bar");
  if(lbl) lbl.innerText = pct + "%";
  if(cnt) cnt.innerText = `${done}/${total} exercises`;
  if(bar) bar.style.width = pct + "%";
  
  if(pct === 100 && total > 0) { triggerConfetti(); }
}

function updateDashStats(){
  let w = S.fields["weight"] || "";
  let wa = S.fields["waist"] || "";
  let prot = S.fields["protein"] || "";
  let stp = S.fields["steps"] || "";
  
  let we = document.getElementById("statWeight");
  let wae = document.getElementById("statWaist");
  let prote = document.getElementById("statProtein");
  let stpe = document.getElementById("statSteps");
  
  if(we) we.innerText = w !== "" ? w + " kg" : "--";
  if(wae) wae.innerText = wa !== "" ? wa + " cm" : "--";
  if(prote) prote.innerText = prot !== "" ? prot + " g" : "--";
  if(stpe) stpe.innerText = stp !== "" ? parseInt(stp).toLocaleString() : "--";
}

function switchTab(tabId){
  currentTab = tabId;
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("show"));
  let tPage = document.getElementById(`page_${tabId}`);
  if(tPage) tPage.classList.add("show");
  
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  let tBtn = document.querySelector(`[data-nav="${tabId}"]`);
  if(tBtn) tBtn.classList.add("active");
  
  let pBar = document.getElementById("headerProgressBar");
  if(pBar){
    if(tabId === "Workout") {
      pBar.classList.add("visible");
      updateProgress();
    } else {
      pBar.classList.remove("visible");
    }
  }
  
  if(tabId === "Dashboard") updateDashStats();
  if(tabId === "History") renderCalendar();
}

function buildBottomNav(){
  let nav = document.getElementById("bottomNav");
  nav.innerHTML = "";
  let cfg = [
    {id:"Dashboard",label:"My Routine",icon:"📊"},
    {id:"Workout",label:"Workout",icon:"🏋️"},
    {id:"History",label:"History",icon:"📅"}
  ];
  cfg.forEach(c=>{
    let b = document.createElement("button");
    b.className = "nav-btn";
    b.dataset.nav = c.id;
    b.innerHTML = `<span class="nav-icon">${c.icon}</span><span class="nav-label" id="navLabel_${c.id}">${c.label}</span>`;
    b.onclick = () => switchTab(c.id);
    nav.appendChild(b);
  });
}

function renderAllPages(){
  let container = document.getElementById("pages");
  container.innerHTML = "";
  
  let dash = document.createElement("div");
  dash.className = "page";
  dash.id = "page_Dashboard";
  
  let q = QUOTES[Math.floor(Math.random()*QUOTES.length)];
  let prHTML = "";
  PR_FIELDS.forEach(f=>{
    let val = S.fields[`pr_${f}`] || "";
    prHTML += `<div class="pr-item"><label>${f}</label><input type="text" data-id="pr_${f}" value="${val}" placeholder="--" onchange="saveState(); showSaveToast();"></div>`;
  });

  dash.innerHTML = `
    <div class="card quote-card">
      <div class="quote-text">"${q.t}"</div>
      <div class="quote-author">— ${q.a}</div>
    </div>
    <div class="dash-grid">
      <div class="card">
        <div class="stat-box">
          <div class="stat-val green" id="statWeight">--</div>
          <div class="stat-label">Weight</div>
          <div class="weight-log-row">
            <input type="number" step="0.1" data-id="weight" value="${S.fields["weight"]||""}" placeholder="kg" oninput="saveState();updateDashStats();showSaveToast();">
          </div>
        </div>
      </div>
      <div class="card">
        <div class="stat-box">
          <div class="stat-val cyan" id="statWaist">--</div>
          <div class="stat-label">Waist</div>
          <div class="weight-log-row">
            <input type="number" step="0.1" data-id="waist" value="${S.fields["waist"]||""}" placeholder="cm" oninput="saveState();updateDashStats();showSaveToast();">
          </div>
        </div>
      </div>
      <div class="card">
        <div class="stat-box">
          <div class="stat-val purple" id="statProtein">--</div>
          <div class="stat-label">Protein Intake</div>
          <div class="weight-log-row">
            <input type="number" data-id="protein" value="${S.fields["protein"]||""}" placeholder="grams" oninput="saveState();updateDashStats();showSaveToast();">
          </div>
        </div>
      </div>
      <div class="card">
        <div class="stat-box">
          <div class="stat-val orange" id="statSteps">--</div>
          <div class="stat-label">Daily Steps</div>
          <div class="weight-log-row">
            <input type="number" data-id="steps" value="${S.fields["steps"]||""}" placeholder="steps" oninput="saveState();updateDashStats();showSaveToast();">
          </div>
        </div>
      </div>
       <div class="card dash-full" style="min-height:auto;">
        <div class="stat-label" style="text-align:center;margin-bottom:6px;">🥛 H2O Counter</div>
        <div class="water-row" id="waterRow"></div>
      </div>
      <div class="card dash-full" style="min-height:auto;padding-bottom:16px;">
        <div class="analytics-title" style="color:var(--ac3);">🏆 PERSONAL RECORDS (PR TRACKER)</div>
        <div class="pr-grid">${prHTML}</div>
      </div>
    <div class="card dash-full">
      <h3 style="font-size:0.85rem;margin-bottom:6px;">📝 Weekly Notes</h3>
      <textarea data-id="notes" oninput="saveState(); showSaveToast();" rows="3" placeholder="Log progress observations...">${S.fields["notes"]||""}</textarea>
    </div>
    </div>
  `;
  container.appendChild(dash);

  let wk = document.createElement("div");
  wk.className = "page";
  wk.id = "page_Workout";
  
  let currentDayExercises = S.plan[S.currentRoutine] || [];
  let exHTML = "";
  if(currentDayExercises.length === 0){
    exHTML = `<div style="text-align:center;padding:40px var(--tx2);font-size:0.85rem;color:var(--tx2);">Rest block configured. Use manage buttons to append tracks.</div>`;
  } else {
    currentDayExercises.forEach(ex=>{
      let isDone = S.fields[`chk_${ex}`] || false;
      let setRows = "";
      for(let s=1; s<=3; s++){
        let wV = S.fields[`w_${ex}_${s}`] || "";
        let rV = S.fields[`r_${ex}_${s}`] || "";
        setRows += `
          <div class="set-chip ${wV!=''?'done-set':''}">
            <span class="set-num">Set ${s}</span>
            <input type="text" id="w_${ex}_${s}" placeholder="kg" value="${wV}" style="padding:2px 4px;font-size:0.7rem;text-align:center;margin-top:2px;" oninput="saveState(); showSaveToast();">
            <input type="number" id="r_${ex}_${s}" placeholder="reps" value="${rV}" style="padding:2px 4px;font-size:0.7rem;text-align:center;margin-top:2px;" oninput="saveState(); showSaveToast();">
          </div>
        `;
      }
      exHTML += `
        <div class="card ${isDone?'completed':''}" id="card_${ex}">
          <div class="exercise-header">
            <div class="name">${ex}</div>
            <div class="check-wrap">
              <input type="checkbox" id="chk_${ex}" ${isDone?'checked':''} onchange="handleCheck('${ex}')">
              <div class="check-box"></div>
            </div>
          </div>
          <div class="sets-row">${setRows}</div>
        </div>
      `;
    });
  }
  
  wk.innerHTML = `
    <div class="day-header">
      <div class="day-title">${S.currentRoutine} Layout</div>
      <div class="day-header-right">
        <button class="action-icon-btn" onclick="promptAddExercise()">➕</button>
        <button class="action-icon-btn" onclick="openRemoveModal()">🗑️</button>
        <button class="complete-all-btn" onclick="completeAll()">Quick Clear</button>
      </div>
    </div>
    <div id="exerciseListContainer">${exHTML}</div>
  `;
  container.appendChild(wk);

  let hist = document.createElement("div");
  hist.className = "page";
  hist.id = "page_History";
  hist.innerHTML = `
   <div class="card">

      <div class="stat-box" style="flex:1;min-width:100px;">

        <div class="stat-label">Current Streak</div>
      </div>
      <div class="stat-box" style="flex:1;min-width:100px;">
        <div class="stat-val cyan" id="histTotal">2</div>
        <div class="stat-label">Completed Sessions</div>
      </div>
    </div>
    </div>   
    <div class="calendar-wrapper">
      <div class="calendar-header">
        <button class="calendar-nav-btn" onclick="changeMonth(-1)">◀</button>
        <div class="calendar-month-title" id="calMonthTitle">Month Year</div>
        <button class="calendar-nav-btn" onclick="changeMonth(1)">▶</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
    <div style="margin-top:14px; font-weight:700; font-size:0.8rem; color:var(--ac3); text-transform:uppercase;">Selected Log Metrics & Records</div>
    <div class="selected-day-log" id="selectedDayLogContainer">Select a highlighted day to inspect logged structural items.</div> <br>
     <div class="analytics-box">
      <div class="analytics-title">☁️ Sync Personal Profile</div>
      
      <div class="input-group" style="margin-bottom: 10px;">
        <label>Your Private Sync Key</label>
        <div style="display:flex; gap:6px;">
          <input type="text" id="syncKeyInput" value="${S.gdriveSyncKey || ''}" placeholder="e.g., gym-abcde-12345" onchange="S.gdriveSyncKey = this.value.trim(); saveState();" style="flex:1;">
          <button class="export-btn" onclick="generateRandomSyncKey()" style="padding:0 10px; margin:0;">🎲 New</button>
        </div>
        <small style="font-size:0.65rem; color:var(--tx3); margin-top:2px;">Keep this key secret. Enter it on another device to share your layout.</small>
      </div>

      <div class="switch-wrap">
        <span class="switch-label" onclick="document.getElementById('syncGdriveToggle').click()">Enable Cloud Sync</span>
        <label class="switch-box">
          <input type="checkbox" id="syncGdriveToggle" ${S.gdriveSyncEnabled?'checked':''} onchange="handleSyncToggle(this.checked)">
          <span class="switch-slider"></span>
        </label>
      </div>
      
      <div id="gdriveStatusText" style="font-size: 0.75rem; color: var(--tx2); margin: 8px 4px 0; font-style: italic;">
        ${S.gdriveSyncEnabled ? 'Connected' : 'Status: Local Only'}
      </div>
      
      <div class="export-section" style="margin-top:12px; gap: 6px;">
        <button class="export-btn" onclick="exportLocalJSON()">📥 Export Backup</button>
        <button class="export-btn" onclick="document.getElementById('importFile').click()">📤 Import Backup</button>
        <input type="file" id="importFile" class="import-input" onchange="importData(event)">
        <button class="export-btn gdrive" onclick="triggerManualCloudSync()">🔄 Sync Now</button>
      </div>
    </div>
    <div class="version-card">
      <span>Build Version</span>
      <span class="version-tag">v2.0.3</span>
    </div>
  `;
  container.appendChild(hist);
  
  buildWaterGlasses();

  let activePage = document.getElementById(`page_${currentTab}`);
  if(activePage) activePage.classList.add("show");
}

function handleCheck(ex){
  let cb = document.getElementById(`chk_${ex}`);
  let card = document.getElementById(`card_${ex}`);
  if(cb && card){
    if(cb.checked) card.classList.add("completed");
    else card.classList.remove("completed");
  }
  saveState();
  updateProgress();
  showSaveToast();
}

function completeAll(){
  let currentDayExercises = S.plan[S.currentRoutine] || [];
  currentDayExercises.forEach(ex=>{
    let cb = document.getElementById(`chk_${ex}`);
    let card = document.getElementById(`card_${ex}`);
    if(cb){
      cb.checked = true;
      if(card) card.classList.add("completed");
    }
  });
  saveState();
  updateProgress();
  showSaveToast();
}

function promptAddExercise(){
  let name = prompt("Enter custom track name:");
  if(name && name.trim() !== ""){
    if(!S.plan[S.currentRoutine]) S.plan[S.currentRoutine] = [];
    S.plan[S.currentRoutine].push(name.trim());
    saveState();
    renderAllPages();
    switchTab("Workout");
    showSaveToast();
  }
}

function openRemoveModal(){
  let currentDayExercises = S.plan[S.currentRoutine] || [];
  let container = document.getElementById("removeCheckboxes");
  if(!container) return;
  container.innerHTML = "";
  if(currentDayExercises.length === 0){
    container.innerHTML = `<p style="font-size:0.75rem;color:var(--tx3);">No target tracks present.</p>`;
  } else {
    currentDayExercises.forEach(ex=>{
      container.innerHTML += `
        <label class="exercise-check">
          <input type="checkbox" value="${ex}">
          <span>${ex}</span>
        </label>
      `;
    });
  }
  document.getElementById("removeModal").classList.add("open");
}

function closeRemoveModal(){
  document.getElementById("removeModal").classList.remove("open");
}

function confirmRemove(){
  let checked = document.querySelectorAll("#removeCheckboxes input:checked");
  let toRemove = Array.from(checked).map(c=>c.value);
  if(toRemove.length > 0){
    S.plan[S.currentRoutine] = (S.plan[S.currentRoutine]||[]).filter(ex=>!toRemove.includes(ex));
    saveState();
    renderAllPages();
    switchTab("Workout");
    showSaveToast();
  }
  closeRemoveModal();
}

function buildWaterGlasses(){
  let wr = document.getElementById("waterRow");
  if(!wr) return;
  wr.innerHTML = "";
  for(let i=0; i<8; i++){
    let g = document.createElement("div");
    g.className = "water-glass" + (i < S.water ? " filled" : "");
    g.innerText = "💧";
    g.onclick = () => {
      if(i < S.water) S.water = i;
      else S.water = i + 1;
      saveState();
      buildWaterGlasses();
      showSaveToast();
    };
    wr.appendChild(g);
  }
}

function updateStreakBadge(){
  let countEl = document.getElementById("streakCount");
  if(countEl) countEl.innerText = S.streak.count || 0;
  let tBadge = document.getElementById("todayBadge");
  if(tBadge){
    let loggedToday = S.workoutLog[new Date().toISOString().split("T")[0]];
    if(loggedToday && loggedToday.some(e=>e.done)) tBadge.style.display = "inline-flex";
    else tBadge.style.display = "none";
  }
}

function renderCalendar(){
  let titleEl = document.getElementById("calMonthTitle");
  let gridEl = document.getElementById("calendarGrid");
  if(!titleEl || !gridEl) return;
  
  let months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  titleEl.innerText = `${months[S.calMonth]} ${S.calYear}`;
  gridEl.innerHTML = "";
  
  let days = ["M","T","W","T","F","S","S"];
  days.forEach(d=>{ gridEl.innerHTML += `<div class="calendar-day-lbl">${d}</div>`; });
  
  let firstDay = new Date(S.calYear, S.calMonth, 1).getDay();
  let shift = firstDay === 0 ? 6 : firstDay - 1;
  let daysInMo = new Date(S.calYear, S.calMonth + 1, 0).getDate();
  
  for(let i=0; i<shift; i++){ gridEl.innerHTML += `<div></div>`; }
  
  for(let d=1; d<=daysInMo; d++){
    let dateStr = `${S.calYear}-${String(S.calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let hasLog = S.workoutLog[dateStr] && S.workoutLog[dateStr].some(e=>e.done);
    let cell = document.createElement("div");
    cell.className = "calendar-cell" + (dateStr === S.workoutDate ? " active-day" : "");
    cell.innerText = d;
    if(hasLog){
      let dot = document.createElement("div");
      dot.className = "dot-indicator";
      cell.appendChild(dot);
    }
    cell.onclick = () => showDayLog(dateStr);
    gridEl.appendChild(cell);
  }
}

function changeMonth(dir){
  S.calMonth += dir;
  if(S.calMonth < 0) { S.calMonth = 11; S.calYear--; }
  if(S.calMonth > 11) { S.calMonth = 0; S.calYear++; }
  renderCalendar();
}

function showDayLog(dateStr){
  S.workoutDate = dateStr;
  document.getElementById("globalWorkoutDate").value = dateStr;
  loadActiveDayLog();
  
  let d = new Date(dateStr);
  let dayIdx = (d.getDay()+6)%7;
  S.currentRoutine = dayKeys[dayIdx] || "Monday";
  
  renderAllPages();
  switchTab("History");
  
  let logs = S.workoutLog[dateStr];
  let container = document.getElementById("selectedDayLogContainer");
  if(!container) return;
  
  let html = `<div style="font-weight:700;margin-bottom:8px;color:var(--ac);">${dateStr}</div>`;
  let recordsFound = false;
  
  let prFieldsWithData = Object.keys(S.fields).filter(k=>k.startsWith("pr_") && S.fields[k] !== "");
  if(prFieldsWithData.length > 0){
    recordsFound = true;
    html += `<div style="font-weight:700;font-size:0.7rem;color:var(--tx2);margin-bottom:4px;text-transform:uppercase;">Personal Track records</div>`;
    prFieldsWithData.forEach(k=>{
      let fieldName = k.replace("pr_", "");
      html += `
        <div class="history-pr-card">
          <span class="history-pr-name">${fieldName}</span>
          <span class="history-pr-val">${S.fields[k]}</span>
        </div>
      `;
    });
  }

  let wRec = S.weightHistory.find(e=>e.date===dateStr);
  let waRec = S.waistHistory.find(e=>e.date===dateStr);
  let protRec = S.proteinHistory.find(e=>e.date===dateStr);
  let stepsRec = S.stepsHistory.find(e=>e.date===dateStr);
  
  if(wRec || waRec || protRec || stepsRec){
    recordsFound = true;
    html += `<div style="font-weight:700;font-size:0.7rem;color:var(--tx2);margin-top:8px;margin-bottom:4px;text-transform:uppercase;">Tracked Metrics</div>`;
    if(wRec && wRec.value !== "") html += `<div class="history-pr-card"><span class="history-pr-name">Weight</span><span class="history-pr-val" style="color:var(--ac); background:rgba(0,230,118,0.1);">${wRec.value} kg</span></div>`;
    if(waRec && waRec.value !== "") html += `<div class="history-pr-card"><span class="history-pr-name">Waist</span><span class="history-pr-val" style="color:var(--ac); background:rgba(0,230,118,0.1);">${waRec.value} cm</span></div>`;
    if(protRec && protRec.value !== "") html += `<div class="history-pr-card"><span class="history-pr-name">Protein</span><span class="history-pr-val" style="color:var(--ac3); background:rgba(124,77,255,0.1);">${protRec.value} g</span></div>`;
    if(stepsRec && stepsRec.value !== "") html += `<div class="history-pr-card"><span class="history-pr-name">Steps</span><span class="history-pr-val" style="color:var(--orn); background:rgba(255,171,64,0.1);">${stepsRec.value.toLocaleString()}</span></div>`;
  }
  
  if(logs && Array.isArray(logs)){
    recordsFound = true;
    html += `<div style="font-weight:700;font-size:0.7rem;color:var(--tx2);margin-top:8px;margin-bottom:4px;text-transform:uppercase;">Executed Track Exercises</div>`;
    logs.forEach(l=>{
      if(l.done){
        let setDetails = l.sets ? l.sets.map((s,i)=>(s.w||s.r)?`S${i+1}: ${s.w||0}kg x ${s.r||0}r`:null).filter(Boolean).join(" | ") : "";
        html += `
          <div class="history-pr-card" style="align-items:flex-start; flex-direction:column; gap:4px;">
            <div style="display:flex; justify-content:space-between; width:100%;">
              <span class="history-pr-name" style="color:var(--tx);">✔ ${l.exercise}</span>
            </div>
            ${setDetails?`<div style="font-size:0.65rem; color:var(--tx2);">${setDetails}</div>`:''}
          </div>
        `;
      }
    });
  }
  
  if(!recordsFound){
    html += `<div style="color:var(--tx3);font-size:0.75rem;">No metrics or session logs stored on this node.</div>`;
  }
  
  container.innerHTML = html;
  showSaveToast();
}

function importData(e){
  let file = e.target.files[0];
  if(!file) return;
  let reader = new FileReader();
  reader.onload = function(evt){
    try {
      let parsed = JSON.parse(evt.target.result);
      if(parsed && typeof parsed === "object"){
        S = Object.assign(S, parsed);
        localStorage.setItem(SAVE_KEY, JSON.stringify(S));
        loadState();
        renderAllPages();
        showSaveToast();
      }
    } catch(err){ alert("Error interpreting imported backup file structural content."); }
  };
  reader.readAsText(file);
}

let audioCtx = null;
function playBeep(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  let times = [0, 0.25, 0.5];
  times.forEach(t=>{
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(880, audioCtx.currentTime + t);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime + t);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + t + 0.15);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime + t);
    osc.stop(audioCtx.currentTime + t + 0.15);
  });
}

let timerInt = null;
let timerSeconds = 60;
let timerRunning = false;

function toggleTimer(){
  let el = document.getElementById("timerOverlay");
  if(el.classList.contains("open")) el.classList.remove("open");
  else el.classList.add("open");
}

function setTimerPreset(sec, btn){
  document.querySelectorAll(".timer-preset").forEach(p=>p.classList.remove("active"));
  if(btn) btn.classList.add("active");
  timerSeconds = sec;
  updateTimerDisplay();
}

function updateTimerDisplay(){
  let m = Math.floor(timerSeconds/60);
  let s = timerSeconds%60;
  document.getElementById("timerDisplay").innerText = `${m}:${String(s).padStart(2,'0')}`;
}

function startTimer(){
  let btn = document.getElementById("timerStartBtn");
  let tBtn = document.getElementById("timerToggle");
  if(timerRunning){
    clearInterval(timerInt);
    timerRunning = false;
    if(btn) btn.innerText = "Start";
    if(tBtn) tBtn.classList.remove("running");
  } else {
    timerRunning = true;
    if(btn) btn.innerText = "Stop";
    if(tBtn) tBtn.classList.add("running");
    timerInt = setInterval(()=>{
      timerSeconds--;
      if(timerSeconds <= 0){
        clearInterval(timerInt);
        timerRunning = false;
        timerSeconds = 60;
        if(btn) btn.innerText = "Start";
        if(tBtn) tBtn.classList.remove("running");
        playBeep();
        triggerConfetti();
      }
      updateTimerDisplay();
    },1000);
  }
}

function resetTimer(){
  clearInterval(timerInt);
  timerRunning = false;
  timerSeconds = 60;
  let btn = document.getElementById("timerStartBtn");
  let tBtn = document.getElementById("timerToggle");
  if(btn) btn.innerText = "Start";
  if(tBtn) tBtn.classList.remove("running");
  document.querySelectorAll(".timer-preset").forEach(p=>p.classList.remove("active"));
  let firstP = document.querySelector(".timer-preset");
  if(firstP) firstP.classList.add("active");
  updateTimerDisplay();
}

function triggerConfetti(){
  let canvas = document.getElementById("confetti");
  if(!canvas) return;
  let ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  let pieces = [];
  for(let i=0; i<60; i++){
    pieces.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height - canvas.height,
      r: Math.random()*4+2,
      d: Math.random()*canvas.height,
      color: ["#00e676","#00bcd4","#7c4dff","#ffab40"][Math.floor(Math.random()*4)],
      tilt: Math.random()*10-5
    });
  }
  let start = Date.now();
  function draw(){
    if(Date.now() - start > 2000){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      return;
    }
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      p.y += 4;
      p.tilt += 0.1;
      ctx.beginPath();
      ctx.lineWidth = p.r;
      ctx.strokeStyle = p.color;
      ctx.moveTo(p.x + p.tilt + p.r/2, p.y);
      ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r/2);
      ctx.stroke();
    });
    requestAnimationFrame(draw);
  }
  draw();
}

window.onload = () => {
  loadState();
  buildBottomNav();
  renderAllPages();
  updateStreakBadge();
  switchTab("Dashboard");
  
  if (S.gdriveSyncEnabled) {
    fetchDataFromCloudDrive();
  }
};
